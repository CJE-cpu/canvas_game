<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANVAS 벽돌게임</title>
    <style>
        body{
            background-color: #333;
        }
        #gameBox{
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas{
            border: 4px solid white;
            background-color: #111;
            margin: 0 auto;
        }
        #startBtn, #restartBtn{
            position: absolute;
            left: 50%;top: 50%;
            transform: translate(-50%, -50%);
            padding: 10px 20px;
            background-color: white;
            color: #111;
            font-size: 20px;
            cursor: pointer;
            border: none;
            font-weight: bold;
            background-color: rgb(245, 243, 132);
        }
        #startBtn{
            display: block;
        }
        #restartBtn{
            display: none;
        }
        #mode{
            position: absolute;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-top: 60px;
        }
        #easy, #normal, #hard{
            padding: 5px 20px;
            font-size: 28px;
            border: none;
            display: none;
            cursor: pointer;
            font-weight: bold;
        }
        #easy{
            background-color: rgb(141, 237, 100);
        }
        #normal{
            background-color: rgb(251, 247, 133);
        }
        #hard{
            background-color: rgb(240, 73, 64);
        }
    </style>
</head>
<body>
    <div id="gameBox">
        <canvas width="800" height="500"></canvas>
        <button id="startBtn">시작</button>
        <button id="restartBtn">다시 시작</button>
        <!-- 난이도 선택 -->
        <div id="mode">
            <button id="easy" onclick="easyMode()">쉬움</button>
            <button id="normal" onclick="normalMode()">보통</button>
            <button id="hard" onclick="hardMode()">어려움</button>
        </div>
    </div>
    <script>
        const canvas = document.querySelector("canvas")
        const startBtn = document.getElementById("startBtn")
        const restartBtn = document.getElementById("restartBtn")
        const easy = document.getElementById("easy")
        const normal = document.getElementById("normal")
        const hard = document.getElementById("hard")
        const ctx = canvas.getContext("2d")

        // 공
        let ballX
        let ballY
        let ballR = 10
        let ballSpeedX
        let ballSpeedY

        // 바
        let barX
        let barY = canvas.height - 40
        let barW = 100
        let barH = 15

        // 벽돌
        let bricks = []
        let bricksRow = 3
        let bricksCol = 6
        let bricksW = 100
        let bricksH = 25
        let bricksGap = 15
        let brickscount = bricksCol * bricksRow

        // 게임상태
        let gameOver
        let aniId

        // function startGame(){
        //     // 공의 정보
        //     ballX = canvas.width / 2
        //     ballY = canvas.height - 80
        //     ballSpeedX = 4
        //     ballSpeedY = -4

        //     // 바의 정보
        //     barX = canvas.width / 2 - barW / 2

        //     // 벽돌 정보
        //     bricks = []
        //     for(let row = 0; row < bricksRow; row++){
        //         for(let col = 0; col < bricksCol; col++){
        //             bricks.push({
        //                 x : 57.5 + col * (bricksW + bricksGap),
        //                 y : 40 + row * (bricksH + bricksGap),
        //                 show : true
        //             })
        //         }
        //     }

        //     // 상태 정보
        //     gameOver = false
        //     restartBtn.style.display = "none"


        //     // 애니메이션 실행
        //     animate()

        // }

        startBtn.addEventListener("click", function(){
            modeSelect()
        })


        function modeSelect(){
            cancelAnimationFrame(aniId)
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)"
            ctx.fillRect(0, 0, canvas.width, canvas.height)

            ctx.fillStyle = "white"
            ctx.font = "bold 40px sans-serif"
            ctx.textAlign = "center"
            ctx.fillText("select mode", canvas.width / 2, canvas.height / 5)

            startBtn.style.display = "none"
            restartBtn .style.display = "none"
            easy.style.display = "block"
            normal.style.display = "block"
            hard.style.display = "block"
        }
        function easyMode(){
            bricksCol = 5
            bricksRow = 2
            bricksW = 120
            bricksH = 35
            brickscount = bricksCol * bricksRow
            // 공의 정보
            ballX = canvas.width / 2
            ballY = canvas.height - 80
            ballSpeedX = 2.5
            ballSpeedY = -2.5

            // 바의 정보
            barX = canvas.width / 2 - barW / 2

            // 벽돌 정보
            bricks = []
            for(let row = 0; row < bricksRow; row++){
                for(let col = 0; col < bricksCol; col++){
                    bricks.push({
                        x : 65 + col * (bricksW + bricksGap),
                        y : 40 + row * (bricksH + bricksGap),
                        show : true
                    })
                }
            }

            // 상태 정보
            gameOver = false
            restartBtn.style.display = "none"
            easy.style.display = "none"
            normal.style.display = "none"
            hard.style.display = "none"


            // 애니메이션 실행
            animate()
        }

        function normalMode(){
            bricksRow = 3
            bricksCol = 6
            bricksW = 100
            bricksH = 25
            brickscount = bricksCol * bricksRow
            // 공의 정보
            ballX = canvas.width / 2
            ballY = canvas.height - 80
            ballSpeedX = 4
            ballSpeedY = -4

            // 바의 정보
            barX = canvas.width / 2 - barW / 2

            // 벽돌 정보
            bricks = []
            for(let row = 0; row < bricksRow; row++){
                for(let col = 0; col < bricksCol; col++){
                    bricks.push({
                        x : 57.5 + col * (bricksW + bricksGap),
                        y : 40 + row * (bricksH + bricksGap),
                        show : true
                    })
                }
            }

            // 상태 정보
            gameOver = false
            restartBtn.style.display = "none"
            easy.style.display = "none"
            normal.style.display = "none"
            hard.style.display = "none"


            // 애니메이션 실행
            animate()
        }

        function hardMode(){
            bricksCol = 7
            bricksRow = 4
            bricksW = 80
            bricksH = 15
            brickscount = bricksCol * bricksRow
            // 공의 정보
            ballX = canvas.width / 2
            ballY = canvas.height - 80
            ballSpeedX = 5
            ballSpeedY = -5

            // 바의 정보
            barX = canvas.width / 2 - barW / 2

            // 벽돌 정보
            bricks = []
            for(let row = 0; row < bricksRow; row++){
                for(let col = 0; col < bricksCol; col++){
                    bricks.push({
                        x : 70 + col * (bricksW + bricksGap),
                        y : 35 + row * (bricksH + bricksGap),
                        show : true
                    })
                }
            }

            // 상태 정보
            gameOver = false
            restartBtn.style.display = "none"
            easy.style.display = "none"
            normal.style.display = "none"
            hard.style.display = "none"


            // 애니메이션 실행
            animate()
        }
        // 그리기
        function draw(){
            ctx.clearRect(0, 0, canvas.width, canvas.height)

            // 공
            ctx.beginPath()
            ctx.fillStyle = "gold"
            ctx.arc(ballX, ballY, ballR, 0, Math.PI * 2)
            ctx.shadowBlur = 10
            ctx.shadowColor = "rgba(255, 245, 61, 0.8)"
            ctx.fill()

            // 바
            ctx.beginPath()
            ctx.shadowColor = "rgba(73, 250, 242, 0.8)"
            ctx.fillStyle = "skyblue"
            ctx.fillRect(barX, barY, barW, barH)

            // 벽돌
            for(let i = 0; i < bricks.length; i++){
                if(bricks[i].show){
                    ctx.shadowBlur = 25
                    ctx.shadowColor = "rgba(249, 79, 41, 0.8)"
                    ctx.fillStyle = "tomato"
                    ctx.fillRect(bricks[i].x, bricks[i].y, bricksW, bricksH)
                }
            }
        }

        // 게임종료
        function endGame(){
            ctx.beginPath()
            gameOver = true
            cancelAnimationFrame(aniId)
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)"
            ctx.fillRect(0, 0, canvas.width, canvas.height)

            ctx.fillStyle = "white"
            ctx.font = "bold 40px sans-serif"
            ctx.textAlign = "center"
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 4)

            restartBtn.style.display = "block"
        }

        restartBtn.addEventListener("click", function(){
            modeSelect()
        })

        function winGame(){
            ctx.beginPath()
            gameOver = true
            cancelAnimationFrame(aniId)
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)"
            ctx.fillRect(0, 0, canvas.width, canvas.height)

            ctx.fillStyle = "white"
            ctx.font = "bold 40px sans-serif"
            ctx.textAlign = "center"
            ctx.fillText("YOU WIN!", canvas.width / 2, canvas.height / 4)

            restartBtn.style.display = "block"
        }

        function move(){
            // 공 좌표 변경 (스피드)
            ballX += ballSpeedX
            ballY += ballSpeedY

            // 공이 왼쪽, 오른쪽 벽에
            if(ballX + ballR > canvas.width || ballX - ballR < 0){
                ballSpeedX = ballSpeedX * -1
            }

            // 공이 위쪽, 아래쪽 벽에 부딛혔을 때
            if(ballY - ballR < 0){
                ballSpeedY = ballSpeedY * -1
            }

            // 공이 바에 닿았을때
            if(ballY + ballR > barY &&
               ballX > barX &&
               ballX < barW + barX
            ){
                ballSpeedY = ballSpeedY * -1
            }

            // 벽돌에 닿았을 떄
            for(let i = 0; i < bricks.length; i++){
                let b = bricks[i]
                if(b.show &&
                   ballX > b.x &&
                   ballX < b.x + bricksW &&
                   ballY + ballR > b.y &&
                   ballY - ballR < b.y + bricksH
                ){
                    b.show = false
                    brickscount -= 1
                    ballSpeedY = ballSpeedY * -1
                    if(brickscount <= 0){
                        winGame()
                        brickscount = bricksCol * bricksRow
                    }
                }
            }
            // 공이 바닥으로 떨어지면 게임 종료
            if(ballY - ballR > canvas.height){
                endGame()
            }
        }

        // 그리고 지우고 그리고 빨리 실행
        function animate(){
            if(gameOver) return

            draw()
            move()

            aniId = requestAnimationFrame(animate)
        }

        canvas.addEventListener("mousemove", function(e){
            let rect = canvas.getBoundingClientRect()
            // 정보제공
            // { x : x좌표값,
            //   y : y좌표값,
            //   w : 위드값, 
            //   h : 하이값,
            //   top : top위치값,
            //   left : left위치값
            //   ..   
            // }
            let mouseX = e.clientX - rect.left
            barX = mouseX - barW/2

            if(barX < 0){
                barX = 0
            }

            if(barX + barW > canvas.width){
                barX = canvas.width - barW
            }
        })

        window.addEventListener("keydown", function(e){
            if(e.key === "ArrowLeft"){
                barX = barX - 25
            }

            if(e.key === "ArrowRight"){
                barX = barX + 25
            }

            if(barX < 0){
                barX = 0
            }

            if(barX + barW > canvas.width){
                barX = canvas.width - barW
            }
        })

    </script>
</body>
</html>
